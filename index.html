<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Méteo</title>
  <link rel="stylesheet" href="src/output.css">
  <link rel="shortcut icon" href="assets/icons/weather.ico" type="image/x-icon">
</head>

<body class="h-screen w-screen overflow-hidden bg-[#D69E36]  sm:flex-col sm:items-center sm:justify-center">

 
  <main class="h-full w-full  text-white flex flex-col justify-center items-center m-7">
    <section class="min-h-1  mx-auto gap-12 w-full max-w-4xl px-8 flex flex-col ">

      
      <header class="flex items-center justify-between">
        
        <div class="flex items-center gap-3 text-white/90">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
            <path fill-rule="evenodd"
              d="M12 2.25c-3.866 0-7 3.134-7 7 0 5.25 7 12.5 7 12.5s7-7.25 7-12.5c0-3.866-3.134-7-7-7zm0 9.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z"
              clip-rule="evenodd" />
          </svg>
          <span id="city" class="text-lg font-medium">...</span>
        </div>

        
        <input
          id="searchInput"
          type="text"
          placeholder="Rechercher une ville..."
          class="w-1/3 rounded-full bg-white/30 px-6 py-3 placeholder:text-white/70 backdrop-blur-md focus:outline-none focus:ring-2 focus:ring-white/60"
        />

      </header>

      
      <div class="flex items-center justify-between flex-1">

       
        <div>
          <h1 id="descr" class="text-6xl font-semibold">Cloudy</h1>

          <div id="temperature" class="mt-6 text-7xl font-semibold">
            26<span class="align-top text-4xl">°C</span>
          </div>

          <p id="date" class="mt-4 text-white/80">
            Sunday | 12 Dec 2023
          </p>
        </div>

        <div id="weather-icon" class="text-[180px] leading-none">
          ☁️
        </div>

      </div>

    
      <section class="pb-6">

        <div class="rounded-3xl bg-white/15 backdrop-blur-md px-8 py-6 ">

          <ul id="h-forecast" class="flex gap-6 overflow-x-auto pb-5">
            <li class="flex flex-col items-center gap-2 shrink-0">
              <span class="font-semibold">-9°</span>
              <span>☁️</span>
              <span class="text-sm text-white/70">01h</span>  
            </li>
            <li class="flex flex-col items-center gap-2 shrink-0">
              <span class="font-semibold">-9°</span>
              <span>☁️</span>
              <span class="text-sm text-white/70">03h</span>
            </li>
            <li class="flex flex-col items-center gap-2 shrink-0">
              <span class="font-semibold">-9°</span>
              <span>☁️</span>
              <span class="text-sm text-white/70">05h</span>
            </li>

            <li class="flex flex-col items-center gap-2 shrink-0">
              <span class="font-semibold">-9°</span>
              <span>☁️</span>
              <span class="text-sm text-white/70">07h</span>
            </li>

            <li class="flex flex-col items-center gap-2 shrink-0">
              <span class="font-semibold">-9°</span>
              <span>☁️</span>
              <span class="text-sm text-white/70">09h</span>
            </li>

            <li class="flex flex-col items-center gap-2 shrink-0">
              <span class="font-semibold">-9°</span>
              <span>☁️</span>
              <span class="text-sm text-white/70">11h</span>
            </li>

            <li class="flex flex-col items-center gap-2 shrink-0">
              <span class="font-semibold">-9°</span>
              <span>☁️</span>
              <span class="text-sm text-white/70">13h</span>
            </li>

            <li class="flex flex-col items-center gap-2 shrink-0">
              <span class="font-semibold">-9°</span>
              <span>☁️</span>
              <span class="text-sm text-white/70">15h</span>
            </li>

          </ul>

        </div>

      </section>

    </section>

  </main>


  <script src="./script.js"></script>
</body>
</html>
